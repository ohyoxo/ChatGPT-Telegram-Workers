name: Deploy to Cloudflare Workers

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Wrangler config
        run: |
          touch wrangler.toml
          cat << 'EOF' > wrangler.toml
          ${{ secrets.WRANGLER_TOML }}
          EOF

      - name: Install pnpm and dependencies
        run: |
          npm install -g pnpm
          pnpm install

      - name: Install latest Wrangler
        run: pnpm add -D wrangler@4 -w  # 添加 -w 参数

      - name: Build project
        run: pnpm run build

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: pnpm wrangler deploy --config=wrangler.toml

      - name: Verify deployment
        run: |
          url=${{ secrets.CF_WORKERS_DOMAIN }}
          if [ -z "$url" ]; then
            echo "::warning::CF_WORKERS_DOMAIN is not set"
          else
            echo "Verifying deployment at https://$url/init"
            curl -s -o /dev/null -w "%{http_code}" https://$url/init
            echo "Deployment verification completed"
          fi
